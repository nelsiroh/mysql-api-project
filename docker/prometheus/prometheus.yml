global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape metrics exported by the OpenTelemetry Collector
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  # Optional: scrape Prometheus's own metrics
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]
