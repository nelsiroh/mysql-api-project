extensions:
  file_storage:
    directory: /var/lib/otelcol

receivers:
  otlp:
    protocols:
      http:
      grpc:

processors:
  batch:

exporters:
  # ---- Traces → Tempo ----
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
    sending_queue:
      enabled: true
      storage: file_storage
    retry_on_failure:
      enabled: true

  # ---- Metrics → Prometheus scrape endpoint ----
  prometheus:
    endpoint: "0.0.0.0:8889"

  # ---- Logs → Loki ----
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
    sending_queue:
      enabled: true
      storage: file_storage
    retry_on_failure:
      enabled: true

service:
  extensions: [file_storage]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [loki]
